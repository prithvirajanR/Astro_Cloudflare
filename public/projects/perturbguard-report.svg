<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">PerturbGuard audit report</title>
  <desc id="desc">Plain audit report page with dataset checks and warning table.</desc>
  <rect width="1200" height="675" fill="#f4f4f4"/>
  <rect x="94" y="54" width="1012" height="567" rx="8" fill="#ffffff" stroke="#d8d8d8"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="134" y="116" fill="#111111" font-size="36" font-weight="800">PerturbGuard audit</text>
    <text x="134" y="151" fill="#666666" font-size="20">AnnData perturbation benchmark checks - report.html</text>

    <g font-size="18">
      <rect x="134" y="198" width="210" height="94" fill="#fafafa" stroke="#dddddd"/>
      <text x="158" y="235" fill="#555555">leakage score</text>
      <text x="158" y="270" fill="#111111" font-size="30" font-weight="800">low</text>

      <rect x="374" y="198" width="210" height="94" fill="#fafafa" stroke="#dddddd"/>
      <text x="398" y="235" fill="#555555">controls</text>
      <text x="398" y="270" fill="#111111" font-size="30" font-weight="800">present</text>

      <rect x="614" y="198" width="210" height="94" fill="#fafafa" stroke="#dddddd"/>
      <text x="638" y="235" fill="#555555">split claim</text>
      <text x="638" y="270" fill="#111111" font-size="30" font-weight="800">review</text>

      <rect x="854" y="198" width="212" height="94" fill="#fafafa" stroke="#dddddd"/>
      <text x="878" y="235" fill="#555555">outputs</text>
      <text x="878" y="270" fill="#111111" font-size="30" font-weight="800">csv/json</text>
    </g>

    <rect x="134" y="340" width="932" height="1" fill="#cccccc"/>
    <text x="134" y="382" fill="#111111" font-size="23" font-weight="800">Check table</text>
    <g font-size="18">
      <rect x="134" y="410" width="932" height="46" fill="#f9fafb"/>
      <text x="158" y="440" fill="#666666">status</text>
      <text x="285" y="440" fill="#666666">check</text>
      <text x="840" y="440" fill="#666666">artifact</text>
      <rect x="134" y="456" width="932" height="1" fill="#dddddd"/>

      <text x="158" y="496" fill="#b45309" font-weight="800">WARN</text>
      <text x="285" y="496" fill="#222222">batch variable may explain perturbation labels</text>
      <text x="840" y="496" fill="#555555">tables/confounding.csv</text>
      <rect x="134" y="518" width="932" height="1" fill="#dddddd"/>

      <text x="158" y="558" fill="#047857" font-weight="800">PASS</text>
      <text x="285" y="558" fill="#222222">leave-perturbation-out split has no duplicate targets</text>
      <text x="840" y="558" fill="#555555">split_summary.json</text>
    </g>
  </g>
</svg>
